name: nutrify
description: "Cross-platform Flutter + Firebase nutrition, fitness, and wellness tracker — barcode scanning, ML Kit OCR, BLE wearable support, intermittent fasting, and progress charts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  pedometer: ^4.0.1
  permission_handler: ^11.3.1
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  http: ^1.6.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Charts & Graphs
  fl_chart: ^0.69.0

  # Barcode / Food Scanner
  mobile_scanner: ^5.2.3

  # State Management
  provider: ^6.1.2

  # Custom Notification Tones
  audioplayers: ^6.1.0

  # Animations
  lottie: ^3.1.3

  # Device / Wearable Connection (Bluetooth)
  flutter_blue_plus: ^1.32.12

  # Image picking
  image_picker: ^1.1.2

  # Local file path helpers (for saving profile photos locally)
  path_provider: ^2.1.2
  path: ^1.9.0

  # Smooth page indicators (onboarding)
  smooth_page_indicator: ^1.2.0+3

  # Google Fonts
  google_fonts: ^6.2.1

  # ── Firebase ─────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # Google Sign-In
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App icon generator — run: flutter pub run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

# ── App Icon Configuration ───────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

  # Android adaptive icon (API 26+)
  adaptive_icon_background: "#B6E388"   # matches AppColors.primary
  adaptive_icon_foreground: "assets/images/app_icon.png"

  # iOS — removes white background so icon fills naturally
  remove_alpha_ios: true

  # Web
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#B6E388"
    theme_color: "#B6E388"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
